apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: snippetquiz-brokers
  namespace: snippetquiz
  labels:
    strimzi.io/cluster: snippetquiz-kafka
spec:
  replicas: 2
  roles:
    - broker
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: ephemeral
        kraftMetadata: shared
        size: 1Gi
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: snippetquiz-kafka
  namespace: snippetquiz
spec:
  kafka:
    version: 4.1.1
    metadataVersion: 4.1-IV1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      num.partitions: 2
      offsets.topic.replication.factor: 2
      transaction.state.log.replication.factor: 2
      transaction.state.log.min.isr: 2
      default.replication.factor: 2
      min.insync.replicas: 2
  entityOperator:
    topicOperator: {}
    userOperator: {}
